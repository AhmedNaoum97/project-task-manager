services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=sqlite:///taskmanager.db
      - JWT_SECRET=your-secret-key-change-this
      - FLASK_ENV=production
    volumes:
      - ./backend/instance:/app/instance

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend